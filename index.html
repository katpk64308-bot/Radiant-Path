<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#06080e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Radiant-Path</title>
    <link rel="icon" type="image/png" href="assets/img/icone.png">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <link rel="manifest" href="manifest.webmanifest">

    <link rel="stylesheet" href="styles/menu.css">
    <link rel="stylesheet" href="styles/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div id="menu-screen">
        <div id="orientation-lock-menu" aria-live="polite">
            <p>Gire o celular para usar no modo paisagem.</p>
        </div>

        <div id="ui-container">
            <div class="fire-particles" id="fire"></div>

            <div id="menu">
                <h1>Radiant-Path</h1>

                <a class="start-link menu-arrowed" id="start-game" href="#">Start Game</a>
                <button class="menu-arrowed">Opcoes</button>
                <button class="menu-arrowed">Conquistas</button>
                <button class="menu-arrowed">Extras</button>
                <a class="start-link menu-arrowed" id="exit-button" href="#confirm-exit">Sair</a>
            </div>
        </div>

        <div id="confirm-exit" class="menu-confirm">
            <div class="menu-confirm-box">
                <p>Quer sair?</p>
                <div class="menu-confirm-actions">
                    <a class="confirm-yes" id="confirm-exit-yes" href="#">Sim</a>
                    <a class="confirm-no" href="#">Nao</a>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <a id="back-menu" href="#">Sair</a>

        <div id="confirm-menu" class="menu-confirm">
            <div class="menu-confirm-box">
                <div class="menu-confirm-actions">
                    <a class="confirm-yes menu-arrowed" id="confirm-menu-no" href="#">Continuar</a>
                    <a class="menu-arrowed" id="confirm-menu-options" href="#">Opcoes</a>
                    <a class="confirm-no menu-arrowed" id="confirm-menu-yes" href="#">Sair</a>
                </div>
            </div>
        </div>

        <div id="orientation-lock" aria-live="polite">
            <p>Gire o celular para jogar no modo paisagem.</p>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="touch-controls" aria-hidden="true">
            <div id="analog-base">
                <div id="analog-knob"></div>
            </div>
            <button id="touch-jump" type="button">Pular</button>
        </div>
    </div>

    <script src="src/game/entities/floor.js"></script>
    <script src="src/game/entities/player.js"></script>
    <script src="src/main-game.js"></script>
    <script src="src/main-menu.js"></script>
    <script>
        (function () {
            const interactiveSelector =
                "a, button, input, select, textarea, label, summary, details, [role='button'], [role='link'], [data-allow-default]";

            const isInteractiveTarget = (event) => {
                const target = event && event.target;
                if (!(target instanceof Element)) return false;
                return !!target.closest(interactiveSelector);
            };

            const preventDefault = (event) => {
                event.preventDefault();
            };

            const preventDefaultUnlessInteractive = (event) => {
                if (isInteractiveTarget(event)) return;
                event.preventDefault();
            };

            const preventDefaultForPointer = (event) => {
                if (event.pointerType === "touch" || event.pointerType === "pen") {
                    preventDefaultUnlessInteractive(event);
                }
            };

            document.addEventListener("touchstart", preventDefaultUnlessInteractive, {
                passive: false,
                capture: true,
            });
            document.addEventListener("pointerdown", preventDefaultForPointer, { passive: false, capture: true });
            document.addEventListener("contextmenu", preventDefault, { capture: true });
            document.addEventListener("dragstart", preventDefault, { capture: true });
            document.addEventListener("selectstart", preventDefault, { capture: true });
            document.addEventListener("copy", preventDefault, { capture: true });
            document.addEventListener("cut", preventDefault, { capture: true });
            document.addEventListener("paste", preventDefault, { capture: true });
            document.addEventListener("gesturestart", preventDefault, { capture: true });
            document.addEventListener("gesturechange", preventDefault, { capture: true });
            document.addEventListener("gestureend", preventDefault, { capture: true });
        })();
    </script>
</body>

</html>
