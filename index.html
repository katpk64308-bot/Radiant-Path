<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#06080e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Radiant-Path</title>
    <link rel="icon" type="image/png" href="assets/img/icone.png">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <link rel="manifest" href="manifest.webmanifest">

    <link rel="stylesheet" href="styles/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <div id="orientation-lock-menu" aria-live="polite">
        <p>Gire o celular para usar no modo paisagem.</p>
    </div>

    <div id="ui-container">
        <div class="fire-particles" id="fire"></div>

        <div id="menu">
            <h1>Radiant-Path</h1>

            <a class="start-link" href="game.html">Start Game</a>
            <button>Opcoes</button>
            <button>Conquistas</button>
            <button>Extras</button>
            <a class="start-link" id="exit-button" href="#confirm-exit">Sair</a>
        </div>
    </div>

    <div id="confirm-exit" class="menu-confirm">
        <div class="menu-confirm-box">
            <p>Quer sair?</p>
            <div class="menu-confirm-actions">
                <a class="confirm-yes" id="confirm-exit-yes" href="#">Sim</a>
                <a class="confirm-no" href="#">Nao</a>
            </div>
        </div>
    </div>

    <script src="src/main-menu.js"></script>

</body>

</html>
